name: Portfolio Automation
on: [push] # Runs every time you upload something

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: pip install pandas google-generativeai

      - name: Run Gemini Audit
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_audit.py

      - name: Commit Report
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add DATA_AUDIT_REPORT.md
          git commit -m "Auto-generated data audit" || echo "No changes to commit"
          git push
